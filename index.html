<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="2026년 주요 디자인 트렌드를 한국어로 큐레이션하고 직접 체험할 수 있는 사이트"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F8F7FF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#06060F" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>2026 디자인 트렌드</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="/theme-init.js"></script>

    <style id="theme-critical">
      html {
        color-scheme: light dark;
      }
      html[data-theme='light'] {
        background-color: #f8f7ff;
        color: #0d0d1a;
      }
      html[data-theme='dark'] {
        background-color: #06060f;
        color: #f0f0ff;
      }
    </style>

    <style id="inject-hero-enhancements">
      .hero__title,
      .hero__year,
      .trends-section__title,
      .site-header__logo {
        font-family: 'Space Grotesk', var(--font-family-sans);
      }

      .trend-card[data-category='color'] {
        --card-accent: #ec4899;
      }
      .trend-card[data-category='typography'] {
        --card-accent: #6366f1;
      }
      .trend-card[data-category='motion'] {
        --card-accent: #06b6d4;
      }
      .trend-card[data-category='layout'] {
        --card-accent: #f97316;
      }
      .trend-card[data-category='ai-ux'] {
        --card-accent: #a78bfa;
      }
      .trend-card[data-category='visual'] {
        --card-accent: #14b8a6;
      }
      .trend-card[data-category='accessibility'] {
        --card-accent: #22c55e;
      }
      .trend-card[data-category='interaction'] {
        --card-accent: #f59e0b;
      }
    </style>

    <link rel="stylesheet" href="/design-override.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function () {
        const TRENDS = [
          { label: '도파민 컬러', color: '#FF2D78' },
          { label: 'Kinetic Type', color: '#FFD600' },
          { label: 'Interactive 3D', color: '#00E5FF' },
          { label: 'AI Copilot UX', color: '#A78BFA' },
          { label: 'Micro Delight', color: '#FF6B2B' },
          { label: 'Nostalgia & Retro', color: '#F97316' },
          { label: 'Glassmorphism', color: '#14B8A6' },
          { label: 'Brutalist Clarity', color: '#FACC15' },
          { label: 'Accessibility First', color: '#22C55E' },
          { label: 'MX Design', color: '#8B5CF6' },
        ];

        function buildMarquee() {
          const band = document.createElement('div');
          band.className = 'marquee-band';
          band.setAttribute('aria-hidden', 'true');

          const track = document.createElement('div');
          track.className = 'marquee-band__track';

          [...TRENDS, ...TRENDS].forEach((t) => {
            const item = document.createElement('span');
            item.className = 'marquee-band__item';
            item.innerHTML = `<span class="marquee-band__dot" style="background:${t.color}"></span>${t.label}`;
            track.appendChild(item);
          });

          band.appendChild(track);
          return band;
        }

        function upgradeHero(hero) {
          const inner = hero.querySelector('.hero__inner, .container');
          if (!inner) return;

          const titleEl = inner.querySelector('h1, .hero__title');
          if (titleEl && !hero.querySelector('.hero__year')) {
            const year = document.createElement('span');
            year.className = 'hero__year';
            year.setAttribute('aria-hidden', 'true');
            year.textContent = '2026';
            inner.insertBefore(year, inner.firstChild);
          }

          if (titleEl && !titleEl.querySelector('em')) {
            titleEl.innerHTML = titleEl.innerHTML.replace(
              /(트렌드|Trends?)/gi,
              '<em>$1</em>',
            );
          }

          if (!hero.querySelector('.hero__eyebrow')) {
            const eyebrow = document.createElement('p');
            eyebrow.className = 'hero__eyebrow';
            eyebrow.textContent = 'Curated in Korea · 2026';
            if (titleEl) titleEl.parentNode.insertBefore(eyebrow, titleEl);
          }

          if (!hero.querySelector('.hero__stats')) {
            const stats = document.createElement('div');
            stats.className = 'hero__stats';
            const trendCount =
              document.querySelectorAll('.trend-grid__item').length || 24;
            stats.innerHTML = `
              <div class="hero__stat">
                <div class="hero__stat-num">${trendCount}</div>
                <div class="hero__stat-label">핵심 트렌드</div>
              </div>
              <div class="hero__stat">
                <div class="hero__stat-num">100%</div>
                <div class="hero__stat-label">한국어</div>
              </div>
              <div class="hero__stat">
                <div class="hero__stat-num">체험형</div>
                <div class="hero__stat-label">인터랙션 시연</div>
              </div>
            `;
            inner.appendChild(stats);
          }
        }

        function upgradeCards() {
          document.querySelectorAll('.trend-card').forEach((card) => {
            const tagEl = card.querySelector('.trend-card__tag');
            if (!tagEl) return;
            const tagText = tagEl.textContent.trim();
            const map = {
              컬러: 'color',
              타이포: 'typography',
              모션: 'motion',
              레이아웃: 'layout',
              'AI UX': 'ai-ux',
              비주얼: 'visual',
              접근성: 'accessibility',
              인터랙션: 'interaction',
            };
            const cat = Object.entries(map).find(([k]) => tagText.includes(k));
            if (cat) card.setAttribute('data-category', cat[1]);
          });
        }

        function upgradeHeader() {
          const header = document.querySelector('.header, .site-header');
          if (header && !header.classList.contains('site-header')) {
            header.classList.add('site-header');
          }
          const inner = document.querySelector('.header__inner');
          if (inner && !inner.classList.contains('site-header__inner')) {
            inner.classList.add('site-header__inner');
          }
          const logo = document.querySelector('.header__logo, .site-header__logo');
          if (logo && !logo.classList.contains('site-header__logo')) {
            logo.classList.add('site-header__logo');
          }
        }

        function init() {
          upgradeHeader();

          const hero = document.querySelector('.hero, [class*="hero"]');
          if (hero) {
            upgradeHero(hero);
            if (!document.querySelector('.marquee-band')) {
              hero.after(buildMarquee());
            }
          }

          upgradeCards();

          const grid = document.querySelector('.trend-grid');
          if (grid) {
            new MutationObserver(() => upgradeCards()).observe(grid, {
              childList: true,
              subtree: true,
            });
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => setTimeout(init, 300));
        } else {
          setTimeout(init, 300);
        }

        window.addEventListener('load', () => setTimeout(init, 500));
      })();
    </script>
  </body>
</html>
